codecov:
  require_ci_to_pass: true
  notify:
    after_n_builds: 3
    wait_for_ci: true

coverage:
  status:
    project:
      default:
        target: auto
      linux:
        flags:
          - linux
        target: auto
      macos:
        flags:
          - macos
        target: auto
      windows:
        flags:
          - windows
        target: auto

flags:
  linux:
    paths:
      - src/
  macos:
    paths:
      - src/
  windows:
    paths:
      - src/
