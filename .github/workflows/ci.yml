name: check

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read
  id-token: write

jobs:
  stable-check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            coverage_flag: linux
            coverage_file: coverage-linux.xml
          - os: macos-latest
            coverage_flag: macos
            coverage_file: coverage-macos.xml
          - os: windows-latest
            coverage_flag: windows
            coverage_file: coverage-windows.xml
      fail-fast: false
    runs-on: ${{ matrix.os }}
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: install
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: install on windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: moon version
        run: |
          moon version --all

      - name: moon install
        run: |
          moon update
          moon install

      - name: moon check
        run: moon check --target all --deny-warn

      - name: format diff
        run: |
          moon fmt --check

      - name: run moon test
        run: |
          moon test --target all

      - name: run native coverage test
        run: |
          moon test --target native --enable-coverage

      - name: export native coverage report
        run: |
          moon coverage analyze -p justjavac/ffi -- -f cobertura -o "${{ matrix.coverage_file }}"

      - name: upload coverage to Codecov
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          files: ./${{ matrix.coverage_file }}
          flags: ${{ matrix.coverage_flag }}
          name: ${{ matrix.coverage_flag }}-native
          verbose: true

      - name: moon build
        if: false
        run: |
          moon build --target all

  nightly-check:
    continue-on-error: true
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          # - macos-13
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: install on windows
        env:
          MOONBIT_INSTALL_VERSION: nightly
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: moon version
        run: |
          moon version --all

      - name: moon version
        run: |
          moon version --all

      - name: moon install
        run: |
          moon update
          moon install

      - name: moon check
        run: moon check --target all --deny-warn

      - name: format diff
        run: |
          moon fmt --check

      - name: run moon test
        run: |
          moon test --target all

      - name: moon build
        if: false
        run: |
          moon build --target all
